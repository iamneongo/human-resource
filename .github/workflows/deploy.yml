name: Build and Deploy to Dokploy

on:
  push:
    branches:
      - main
      - codex/hr-secure-attendance-payroll
  workflow_dispatch:
    inputs:
      deploy:
        description: Trigger Dokploy redeploy after image push
        required: true
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=${{ secrets.NEXT_PUBLIC_CLERK_SIGN_IN_URL }}
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=${{ secrets.NEXT_PUBLIC_CLERK_SIGN_UP_URL }}
            NEXT_PUBLIC_SENTRY_DISABLED=${{ secrets.NEXT_PUBLIC_SENTRY_DISABLED }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}

      - name: Trigger Dokploy redeploy
        if: github.event_name == 'push' || inputs.deploy == true
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}
        run: |
          if [ -z "${DOKPLOY_URL}" ] || [ -z "${DOKPLOY_API_KEY}" ] || [ -z "${DOKPLOY_APPLICATION_ID}" ]; then
            echo "Dokploy secrets are not configured; skipping redeploy."
            exit 0
          fi

          curl --fail --show-error --silent \
            -X POST "${DOKPLOY_URL%/}/api/application.redeploy" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -d "{\"applicationId\":\"${DOKPLOY_APPLICATION_ID}\",\"title\":\"GitHub Actions deploy\",\"description\":\"${GITHUB_REPOSITORY}@${GITHUB_SHA}\"}"
